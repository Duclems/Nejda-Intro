<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jour (textuel)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: green;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        #weekdayImage {
            display: block;
            width: 1035px;
            max-width: none;
            height: auto;
            margin-left: 100px;
            margin-top: 0;
        }
    </style>
</head>
<body>
    <img id="weekdayImage" alt="Jour de la semaine" />

    <script>
        const weekdayNames = ['dimanche', 'lundi', 'mardi', 'mercredi', 'jeudi', 'vendredi', 'samedi'];
        const weekdayImage = document.getElementById('weekdayImage');
        const weekdayOffsets = {
            dimanche: { marginLeft: 0, marginTop: 50 },
            mardi: { marginLeft: -50, marginTop: 100 },
            mercredi: { marginLeft: 0, marginTop: 50 },
            vendredi: { marginLeft: 0, marginTop: 50 },
            samedi: { marginLeft: 0, marginTop: 50 }
        };

        const singleDigitWeekdayExtra = new Set(['dimanche', 'mercredi', 'vendredi', 'samedi']);

        function setWeekdayLayout(weekdayIndex, dayNum) {
            const name = weekdayNames[weekdayIndex];
            const offset = weekdayOffsets[name] || { marginLeft: 100, marginTop: 0 };
            let marginLeft = offset.marginLeft;
            let marginTop = offset.marginTop;
            if (singleDigitWeekdayExtra.has(name) && dayNum <= 9) {
                marginLeft -= 250;
                marginTop += 30;
            }
            weekdayImage.style.marginLeft = marginLeft + 'px';
            weekdayImage.style.marginTop = marginTop + 'px';
        }

        function showWeekday(weekdayIndex, dayNum) {
            weekdayImage.src = `img/text-day/${weekdayNames[weekdayIndex]}.png`;
            setWeekdayLayout(weekdayIndex, dayNum);
        }

        const params = new URLSearchParams(location.search);

        if (params.has('weekday') && weekdayNames.includes(params.get('weekday'))) {
            const day = params.has('day')
                ? Math.max(1, Math.min(31, parseInt(params.get('day'), 10) || 1))
                : new Date().getDate();
            showWeekday(weekdayNames.indexOf(params.get('weekday')), day);
        } else if (params.has('day')) {
            const day = Math.max(1, Math.min(31, parseInt(params.get('day'), 10) || 1));
            const month = Math.max(1, Math.min(12, parseInt(params.get('month') || String(new Date().getMonth() + 1), 10)));
            const year = parseInt(params.get('year') || String(new Date().getFullYear()), 10);
            showWeekday(new Date(year, month - 1, day).getDay(), day);
        } else {
            showWeekday(new Date().getDay(), new Date().getDate());
        }
    </script>
</body>
</html>
