<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date custom</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: green;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 22px;
        }
        .container {
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }
        img {
            display: block;
            max-width: 100%;
            height: auto;
        }
        #dayImage {
            margin-top: 60px;
            position: relative;
            z-index: 1;
        }
        .day-block {
            position: relative;
        }
        #monthImage {
            position: absolute;
            z-index: 2;
            top: 140px;
            left: 58%;
            margin-left: -230px;
            width: 109%;
            max-width: 579px;
            height: auto;
        }
        #periodImage {
            position: absolute;
            left: 950px;
            top: 120px;
            transform: translateX(-50%);
            margin-top: 6px;
            z-index: 10;
        }
        #weekdayImage {
            position: absolute;
            z-index: 1;
            left: 0;
            margin-left: 100px;
            top: 230px;
            width: 1035px;
            max-width: none;
            height: auto;
        }
        .weather-wrap {
            position: relative;
            width: 650px;
            height: 400px;
            margin-left: 12px;
            margin-top: -350px;
            transform: rotate(-15deg);
            flex-shrink: 0;
        }
        .weather-box {
            position: absolute;
            inset: 0;
            background: white;
            z-index: 0;
        }
        .weather-gif {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: right center;
            padding-right: 20px;
            box-sizing: border-box;
            z-index: 100;
        }
        .param-card {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            background: #fff;
            border-radius: 16px;
            padding: 20px 24px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.35);
            min-width: 760px;
            max-width: 820px;
            box-sizing: border-box;
        }
        .param-card h3 {
            margin: 0 0 20px 0;
            font-size: 1.6rem;
        }
        .param-card label {
            display: block;
            margin-top: 14px;
            font-size: 1.25rem;
        }
        .param-card input, .param-card select {
            width: 100%;
            margin-top: 8px;
            padding: 12px 14px;
            font-size: 1.25rem;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="param-card" id="paramCard">
        <h3>Paramètres</h3>
        <label>Jour <input type="number" id="paramDay" min="1" max="31" value="15" /></label>
        <label>Mois <input type="number" id="paramMonth" min="1" max="12" value="2" /></label>
        <label>Année <input type="number" id="paramYear" min="2000" max="2100" value="2025" /></label>
        <label>Période
            <select id="paramPeriod">
                <option value="">Aucune</option>
                <option value="morning">Matin (3h–12h)</option>
                <option value="noon">Après-midi (12h–18h)</option>
                <option value="evening">Soir (18h–3h)</option>
            </select>
        </label>
        <label>Météo
            <select id="paramWeather">
                <option value="">Aucune</option>
                <option value="sun">Soleil</option>
                <option value="cloudy-sun">Nuageux + soleil</option>
                <option value="rain">Pluie</option>
                <option value="clouds">Nuageux</option>
            </select>
        </label>
    </div>
    <div class="container">
        <div class="day-block">
            <img id="dayImage" alt="Image du jour" />
            <img id="monthImage" alt="Image du mois" />
            <img id="periodImage" alt="Période" />
        </div>
        <img id="weekdayImage" alt="Jour de la semaine" />
        <div id="weatherWrap" class="weather-wrap" style="display: none">
            <div class="weather-box"></div>
            <img id="weatherImage" class="weather-gif" alt="Météo" />
        </div>
    </div>

    <script>
        const weekdayNames = ['dimanche', 'lundi', 'mardi', 'mercredi', 'jeudi', 'vendredi', 'samedi'];
        const periodPaths = { morning: 'img/periods/morning.png', noon: 'img/periods/noon.png', evening: 'img/periods/evening.png' };
        const weatherPaths = { sun: 'img/weather/sun.gif', 'cloudy-sun': 'img/weather/cloudy-sun.gif', rain: 'img/weather/rain.gif', clouds: 'img/weather/clouds.gif' };

        const monthImage = document.getElementById('monthImage');
        const dayImage = document.getElementById('dayImage');
        const weekdayImage = document.getElementById('weekdayImage');
        const periodImage = document.getElementById('periodImage');
        const weatherWrap = document.getElementById('weatherWrap');
        const weatherImage = document.getElementById('weatherImage');
        const paramDay = document.getElementById('paramDay');
        const paramMonth = document.getElementById('paramMonth');
        const paramYear = document.getElementById('paramYear');
        const paramPeriod = document.getElementById('paramPeriod');
        const paramWeather = document.getElementById('paramWeather');
        const weekdayOffsets = {
            dimanche: { marginLeft: 0, topExtra: 50 },
            mardi: { marginLeft: -50, topExtra: 100 },
            mercredi: { marginLeft: 0, topExtra: 50 },
            vendredi: { marginLeft: 0, topExtra: 50 },
            samedi: { marginLeft: 0, topExtra: 50 }
        };

        const singleDigitWeekdayExtra = new Set(['dimanche', 'mercredi', 'vendredi', 'samedi']);

        function setWeekdayLayout(weekdayIndex, dayNum) {
            const name = weekdayNames[weekdayIndex];
            const offset = weekdayOffsets[name] || { marginLeft: 100, topExtra: 0 };
            let marginLeft = offset.marginLeft;
            let topExtra = offset.topExtra;
            if (singleDigitWeekdayExtra.has(name) && dayNum <= 9) {
                marginLeft -= 250;
                topExtra += 30;
            }
            weekdayImage.style.marginLeft = marginLeft + 'px';
            const baseTop = dayNum <= 9 ? 180 : 230;
            weekdayImage.style.top = (baseTop + topExtra) + 'px';
        }

        function getMonthMarginByUnit(unit) {
            if (unit === 1) return -300;
            if (unit === 2) return -250;
            if (unit === 3) return -240;
            if (unit === 4) return -210;
            if (unit === 6) return -240;
            if (unit === 7) return -275;
            if (unit === 8 || unit === 9) return -240;
            return -230;
        }

        const monthUnitOverrides = {
            1: -20,
            3: 10,
            4: -30,
            6: -10,
            7: -30,
            8: -10
        };

        const monthTwentiesOverrides = {
            20: -50,
            21: -30,
            22: -10,
            23: -15
        };

        const monthThirtiesOverrides = {
            30: -320,
            31: -160
        };

        function setMonthLayout(dayNum) {
            let marginLeft = getMonthMarginByUnit(dayNum % 10);
            marginLeft += Math.floor(dayNum / 10) * 200;
            if (dayNum >= 10 && dayNum <= 29) {
                marginLeft += 40;
                const unit = dayNum % 10;
                if (monthUnitOverrides[unit] !== undefined) marginLeft += monthUnitOverrides[unit];
            }
            if (dayNum >= 20 && dayNum <= 29) marginLeft -= 80;
            if (monthTwentiesOverrides[dayNum] !== undefined) marginLeft += monthTwentiesOverrides[dayNum];
            else if (dayNum >= 24 && dayNum <= 29) marginLeft -= 20;
            if (dayNum >= 20 && dayNum <= 29 && dayNum !== 27) marginLeft -= 10;
            if (monthThirtiesOverrides[dayNum] !== undefined) marginLeft += monthThirtiesOverrides[dayNum];
            monthImage.style.marginLeft = marginLeft + 'px';
        }

        function setPeriodLeft(dayNum) {
            periodImage.style.left = (dayNum >= 10 ? 1250 : 950) + 'px';
        }

        function setWeatherMargin(dayNum) {
            let base;
            if (dayNum <= 9) base = 640;
            else if (dayNum <= 19) base = 390;
            else if (dayNum <= 29) base = 320;
            else base = 350;
            if (dayNum === 1 || dayNum === 11 || dayNum === 21 || dayNum === 31) base += 50;
            if (dayNum === 31) base -= 150;
            weatherWrap.style.marginLeft = `-${base}px`;
        }

        function applyParams() {
            const day = Math.max(1, Math.min(31, parseInt(paramDay.value, 10) || 1));
            const month = Math.max(1, Math.min(12, parseInt(paramMonth.value, 10) || 1));
            const year = parseInt(paramYear.value, 10) || new Date().getFullYear();
            const period = paramPeriod.value;
            const weather = paramWeather.value;

            const d = new Date(year, month - 1, day);
            const weekday = d.getDay();

            monthImage.src = `img/month/${month}.png`;
            dayImage.src = `img/day/${day}.png`;
            setMonthLayout(day);
            weekdayImage.src = `img/text-day/${weekdayNames[weekday]}.png`;
            setWeekdayLayout(weekday, day);
            setPeriodLeft(day);
            if (period) {
                periodImage.src = periodPaths[period];
                periodImage.style.display = 'block';
            } else {
                periodImage.style.display = 'none';
            }
            if (weather) {
                weatherImage.src = weatherPaths[weather];
                weatherWrap.style.display = 'block';
                setWeatherMargin(day);
            } else {
                weatherWrap.style.display = 'none';
            }
        }

        [paramDay, paramMonth, paramYear, paramPeriod, paramWeather].forEach(function (el) {
            el.addEventListener('change', applyParams);
            el.addEventListener('input', applyParams);
        });

        var params = new URLSearchParams(location.search);
        if (params.has('day')) paramDay.value = params.get('day');
        if (params.has('month')) paramMonth.value = params.get('month');
        if (params.has('year')) paramYear.value = params.get('year');

        applyParams();
    </script>
</body>
</html>
