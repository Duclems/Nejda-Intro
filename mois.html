<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mois</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: green;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        img {
            display: block;
            max-width: 100%;
            height: auto;
        }
        .day-block {
            position: relative;
        }
        #dayImage {
            margin-top: 60px;
            position: relative;
            z-index: 1;
            visibility: hidden;
        }
        #monthImage {
            position: absolute;
            z-index: 2;
            top: 240px;
            left: 58%;
            margin-left: -300px;
            width: 109%;
            max-width: 579px;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="day-block">
        <img id="dayImage" alt="Numéro du jour" />
        <img id="monthImage" alt="Image du mois" />
    </div>

    <script>
        const dayImage = document.getElementById('dayImage');
        const monthImage = document.getElementById('monthImage');
        const params = new URLSearchParams(location.search);
        const day = params.has('day')
            ? Math.max(1, Math.min(31, parseInt(params.get('day'), 10) || 1))
            : new Date().getDate();
        const month = params.has('month')
            ? Math.max(1, Math.min(12, parseInt(params.get('month'), 10) || 1))
            : new Date().getMonth() + 1;

        dayImage.src = `img/day/${day}.png`;
        monthImage.src = `img/month/${month}.png`;
    </script>
</body>
</html>
