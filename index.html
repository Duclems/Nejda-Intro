<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mois en cours</title>
    <style>
        body {
            margin-left: -200px !important;
            padding: 0;
            background: green;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }
        img {
            display: block;
            max-width: 100%;
            height: auto;
        }
        #dayImage {
            margin-top: 60px;
            position: relative;
            z-index: 1;
        }
        .day-block {
            position: relative;
        }
        #monthImage {
            position: absolute;
            z-index: 2;
            top: 140px;
            left: 58%;
            margin-left: -230px;
            width: 109%;
            max-width: 579px;
            height: auto;
        }
        #periodImage {
            position: absolute;
            left: 950px;
            top: 70px;
            transform: translateX(-50%);
            margin-top: 6px;
            z-index: 10;
        }
        #weekdayImage {
            position: absolute;
            z-index: 1;
            left: 0;
            margin-left: 100px;
            top: 230px;
            width: 1035px;
            max-width: none;
            height: auto;
        }
        .weather-wrap {
            position: relative;
            width: 650px;
            height: 400px;
            margin-left: 12px;
            margin-top: -350px;
            transform: rotate(-15deg);
            flex-shrink: 0;
        }
        .weather-box {
            position: absolute;
            inset: 0;
            background: white;
            z-index: 0;
        }
        .weather-gif {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: right center;
            padding-right: 20px;
            box-sizing: border-box;
            z-index: 100;
        }
        .scroll-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            opacity: 1;
            transition: opacity 0.3s ease;
        }
        .scroll-toggle.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <button type="button" class="scroll-toggle" id="scrollToggle">Défiler jours/mois</button>
    <div class="container">
        <div class="day-block">
            <img id="dayImage" alt="Image du jour" />
            <img id="monthImage" alt="Image du mois" />
            <img id="periodImage" alt="Période" />
        </div>
        <img id="weekdayImage" alt="Jour de la semaine" />
        <div id="weatherWrap" class="weather-wrap" style="display: none">
            <div id="weatherBox" class="weather-box"></div>
            <img id="weatherImage" class="weather-gif" alt="Météo" />
        </div>
    </div>

    <script>
        let day = new Date().getDate();
        let month = new Date().getMonth() + 1;
        let scrollInterval = null;
        let weatherScrollIndex = 0;
        let periodScrollIndex = 0;
        let savedWeatherSrc = '';
        let savedPeriodSrc = '';
        const weekdayNames = ['dimanche', 'lundi', 'mardi', 'mercredi', 'jeudi', 'vendredi', 'samedi'];
        const periodIcons = ['img/periods/morning.png', 'img/periods/noon.png', 'img/periods/evening.png'];
        const weatherIcons = [
            'img/weather/sun.gif',
            'img/weather/cloudy-sun.gif',
            'img/weather/rain.gif',
            'img/weather/clouds.gif'
        ];
        const monthImage = document.getElementById('monthImage');
        const dayImage = document.getElementById('dayImage');
        const weekdayImage = document.getElementById('weekdayImage');
        const periodImage = document.getElementById('periodImage');
        const weatherWrap = document.getElementById('weatherWrap');
        const weatherImage = document.getElementById('weatherImage');

        function setWeatherVisible(show) {
            weatherWrap.style.display = show ? 'block' : 'none';
        }

        const weekdayOffsets = {
            dimanche: { marginLeft: -100, topExtra: 150 },
            mardi: { marginLeft: -50, topExtra: 100 },
            mercredi: { marginLeft: -100, topExtra: 150 },
            vendredi: { marginLeft: -100, topExtra: 150 },
            samedi: { marginLeft: -100, topExtra: 150 }
        };

        function setWeekdayLayout(weekdayIndex, dayNum) {
            const name = weekdayNames[weekdayIndex];
            const offset = weekdayOffsets[name] || { marginLeft: 100, topExtra: 0 };
            weekdayImage.style.marginLeft = offset.marginLeft + 'px';
            const baseTop = dayNum <= 9 ? 180 : 230;
            weekdayImage.style.top = (baseTop + offset.topExtra) + 'px';
        }

        function getMonthMarginByUnit(unit) {
            if (unit === 1) return -300;
            if (unit === 2) return -250;
            if (unit === 3) return -240;
            if (unit === 4) return -210;
            if (unit === 6) return -240;
            if (unit === 7) return -275;
            if (unit === 8 || unit === 9) return -240;
            return -230;
        }

        const monthUnitOverrides = {
            1: -20,
            3: 10,
            4: -30,
            6: -10,
            7: -30,
            8: -10
        };

        const monthTwentiesOverrides = {
            20: -50,
            21: -30,
            22: -10,
            23: -15
        };

        const monthThirtiesOverrides = {
            30: -320,
            31: -160
        };

        function setMonthLayout(dayNum) {
            let marginLeft = getMonthMarginByUnit(dayNum % 10);
            marginLeft += Math.floor(dayNum / 10) * 200;
            if (dayNum >= 10 && dayNum <= 29) {
                marginLeft += 40;
                const unit = dayNum % 10;
                if (monthUnitOverrides[unit] !== undefined) marginLeft += monthUnitOverrides[unit];
            }
            if (dayNum >= 20 && dayNum <= 29) marginLeft -= 80;
            if (monthTwentiesOverrides[dayNum] !== undefined) marginLeft += monthTwentiesOverrides[dayNum];
            else if (dayNum >= 24 && dayNum <= 29) marginLeft -= 20;
            if (dayNum >= 20 && dayNum <= 29 && dayNum !== 27) marginLeft -= 10;
            if (monthThirtiesOverrides[dayNum] !== undefined) marginLeft += monthThirtiesOverrides[dayNum];
            monthImage.style.marginLeft = marginLeft + 'px';
        }

        function getPeriodImage() {
            const h = new Date().getHours();
            if (h >= 3 && h < 12) return 'img/periods/morning.png';
            if (h >= 12 && h < 18) return 'img/periods/noon.png';
            return 'img/periods/evening.png';
        }

        function setPeriodLeft(dayNum) {
            periodImage.style.left = (dayNum >= 10 ? 1250 : 950) + 'px';
        }

        function setWeatherMargin(dayNum) {
            let base;
            if (dayNum <= 9) base = 640;
            else if (dayNum <= 19) base = 390;
            else if (dayNum <= 29) base = 320;
            else base = 350;
            if (dayNum === 1 || dayNum === 11 || dayNum === 21 || dayNum === 31) base += 50;
            weatherWrap.style.marginLeft = `-${base}px`;
        }

        function showCurrentDate() {
            const d = new Date();
            const weekday = d.getDay();
            day = d.getDate();
            month = d.getMonth() + 1;
            monthImage.src = `img/month/${month}.png`;
            dayImage.src = `img/day/${day}.png`;
            setMonthLayout(day);
            // image du jour de la semaine, par ex. img/text-day/vendredi.png
            weekdayImage.src = `img/text-day/${weekdayNames[weekday]}.png`;
            setWeekdayLayout(weekday, day);
            periodImage.src = getPeriodImage();
            setPeriodLeft(day);
            setWeatherMargin(day);
        }

        function scrollStep() {
            const weekday = new Date(2025, month - 1, day).getDay();
            monthImage.src = `img/month/${month}.png`;
            dayImage.src = `img/day/${day}.png`;
            setMonthLayout(day);
            weekdayImage.src = `img/text-day/${weekdayNames[weekday]}.png`;
            setWeekdayLayout(weekday, day);
            periodImage.src = periodIcons[periodScrollIndex % periodIcons.length];
            periodScrollIndex++;
            setPeriodLeft(day);
            weatherImage.src = weatherIcons[weatherScrollIndex % weatherIcons.length];
            weatherScrollIndex++;
            setWeatherMargin(day);
            day = day >= 31 ? 1 : day + 1;
            if (day === 1) month = month >= 12 ? 1 : month + 1;
        }

        function startScroll() {
            if (scrollInterval) return;
            savedWeatherSrc = weatherImage.src || '';
            savedPeriodSrc = periodImage.src || '';
            weatherScrollIndex = 0;
            periodScrollIndex = 0;
            day = 1;
            month = 1;
            scrollStep();
            scrollInterval = setInterval(scrollStep, 800);
            document.getElementById('scrollToggle').textContent = 'Date du jour';
        }

        function stopScroll() {
            if (scrollInterval) {
                clearInterval(scrollInterval);
                scrollInterval = null;
            }
            if (savedWeatherSrc) weatherImage.src = savedWeatherSrc;
            if (savedPeriodSrc) periodImage.src = savedPeriodSrc;
            showCurrentDate();
            document.getElementById('scrollToggle').textContent = 'Défiler jours/mois';
        }

        document.getElementById('scrollToggle').addEventListener('click', function () {
            if (scrollInterval) stopScroll();
            else startScroll();
        });

        let hideButtonTimer = null;
        const scrollBtn = document.getElementById('scrollToggle');

        function scheduleHideButton() {
            if (hideButtonTimer) clearTimeout(hideButtonTimer);
            hideButtonTimer = setTimeout(function () {
                scrollBtn.classList.add('hidden');
            }, 1000);
        }

        function showButton() {
            scrollBtn.classList.remove('hidden');
            scheduleHideButton();
        }

        ['mousemove', 'mousedown', 'click', 'touchstart', 'keydown'].forEach(function (ev) {
            document.addEventListener(ev, showButton, { passive: true });
        });

        scheduleHideButton();
        showCurrentDate();

        function weatherCodeToIcon(code) {
            if (code === 0) return 'img/weather/sun.gif';                      // grand ciel bleu
            if (code === 1 || code === 2) return 'img/weather/cloudy-sun.gif'; // soleil + quelques nuages
            // pluie, neige, orages => même GIF "rain"
            if (
                (code >= 51 && code <= 67) ||  // pluie / bruine
                (code >= 80 && code <= 82) ||  // averses
                (code >= 71 && code <= 77) ||  // neige
                (code >= 85 && code <= 86) ||  // averses de neige
                (code >= 95 && code <= 99)     // orages
            ) {
                return 'img/weather/rain.gif';
            }
            return 'img/weather/clouds.gif';                                   // le reste: nuageux / couvert etc.
        }

        const latitude = 48.5839;
        const longitude = 7.7455;
        const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=weather_code&timezone=Europe%2FParis&models=meteofrance_seamless`;
        fetch(weatherUrl)
            .then(r => r.json())
            .then(data => {
                const code = data.current?.weather_code ?? 0;
                weatherImage.src = weatherCodeToIcon(code);
                setWeatherVisible(true);
                setWeatherMargin(day);
            })
            .catch(() => { setWeatherVisible(false); });
    </script>
</body>
</html>
